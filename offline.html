<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0a0a12" />
<title>OpenClaw Canvas Offline</title>
<style>
  :root {
    color-scheme: dark;
    font-family: "Inter Tight", "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    background: #0a0a12;
    color: #e0e0e8;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 50% 70%, rgba(38, 87, 142, 0.2), transparent 56%),
      linear-gradient(180deg, #090911 0%, #0a0a12 100%);
  }

  main {
    width: min(92vw, 520px);
    border: 1px solid rgba(102, 159, 207, 0.24);
    border-radius: 14px;
    padding: 24px;
    background: rgba(10, 12, 20, 0.82);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
  }

  h1 {
    margin: 0 0 8px;
    font-size: 20px;
    font-weight: 600;
  }

  p {
    margin: 0;
    color: rgba(211, 226, 241, 0.86);
    line-height: 1.5;
  }

  .actions {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  button {
    border: 1px solid rgba(118, 187, 222, 0.3);
    border-radius: 8px;
    background: rgba(18, 34, 49, 0.9);
    color: #d8ecf8;
    padding: 8px 12px;
    cursor: pointer;
  }
</style>
</head>
<body>
<main>
  <h1>Canvas is offline</h1>
  <p>The UI shell is available, but live API and media endpoints need a network connection.</p>
  <div class="actions">
    <button type="button" onclick="window.location.reload()">Retry</button>
  </div>
</main>
</body>
</html>
